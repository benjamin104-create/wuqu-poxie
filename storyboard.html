<style>

  button{border:none;border-radius:10px;padding:8px 14px;font-weight:700;font-family:inherit;cursor:pointer;font-size:13px}
  .primary{background:var(--jade);color:#04140b}
  .ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}

  .prog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--jade),var(--gold));transition:width .3s}
  .status{font-size:12px;color:var(--muted)}
  main{padding:16px 18px 60px;max-width:1400px;margin:0 auto}
  .act{margin:26px 0 10px;font-size:15px;font-weight:800;color:var(--gold);border-left:4px solid var(--gold);padding-left:10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .thumb{position:relative;aspect-ratio:16/9;background:#0b0d12 repeating-linear-gradient(45deg,#0e1117,#0e1117 10px,#0b0d12 10px,#0b0d12 20px);display:flex;align-items:center;justify-content:center;overflow:hidden}

  .thumb .spin{width:28px;height:28px;border:3px solid #2b3341;border-top-color:var(--jade);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);border:1px solid var(--line);border-radius:8px;padding:2px 8px;font-size:11px;font-weight:800;color:var(--jade)}
  .sec{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border-radius:8px;padding:2px 8px;font-size:11px;color:var(--muted)}
  .err{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:12px;text-align:center;padding:10px}
  .body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .shotname{font-size:12px;color:var(--muted);font-weight:700}
  .zh{font-size:13.5px}

  .row{display:flex;gap:6px;flex-wrap:wrap}
  .tip{background:#141a22;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted);margin-top:10px}
  code{background:#0b0d12;padding:1px 5px;border-radius:5px;color:var(--gold)}
  a.dl{color:var(--jade);text-decoration:none;font-size:12px;font-weight:700}
</style>
</head>

// ── IndexedDB 圖片持久化 ─────────────────────────────────
let DB=null;
function db(){return new Promise((res)=>{ if(DB)return res(DB); const q=indexedDB.open("wuqu_sb",1);
  q.onupgradeneeded=e=>e.target.result.createObjectStore("img");
  q.onsuccess=e=>{DB=e.target.result;res(DB)}; q.onerror=()=>res(null);});}
async function imgGet(id){const d=await db();if(!d)return null;return new Promise(r=>{const t=d.transaction("img").objectStore("img").get(id);t.onsuccess=()=>r(t.result||null);t.onerror=()=>r(null);});}
async function imgPut(id,v){const d=await db();if(!d)return;d.transaction("img","readwrite").objectStore("img").put(v,id);}
async function imgDel(id){const d=await db();if(!d)return;d.transaction("img","readwrite").objectStore("img").delete(id);}
async function imgClear(){const d=await db();if(!d)return;d.transaction("img","readwrite").objectStore("img").clear();}

// ── 渲染 ────────────────────────────────────────────────
const board=document.getElementById("board");
const state={}; // id -> {img}
function el(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstChild;}

function render(){
  board.innerHTML="";
  let curAct=null,grid=null;
  for(const s of SHOTS){
    if(s.act!==curAct){curAct=s.act;board.appendChild(el(`<div class="act">${s.act}</div>`));grid=el(`<div class="grid"></div>`);board.appendChild(grid);}
    const card=el(`<div class="card" id="card-${s.id}">
      <div class="thumb" id="thumb-${s.id}"><span class="ph">🎬</span><span class="badge">${s.id}</span><span class="sec">${s.sec}</span></div>
      <div class="body">
        <div class="shotname">${s.shot}</div>
        <div class="zh">${s.zh}</div>
        <details><summary>提示詞（可編輯）</summary><textarea id="p-${s.id}">${s.p}</textarea></details>
        <div class="row">
          <button class="primary mini" data-gen="${s.id}">生成</button>
          <button class="ghost mini" data-regen="${s.id}">重生</button>
          <a class="dl" id="dl-${s.id}" style="display:none">⬇ 下載</a>
        </div>
      </div></div>`);
    grid.appendChild(card);
  }
  board.querySelectorAll("[data-gen]").forEach(b=>b.onclick=()=>genOne(b.dataset.gen,false));
  board.querySelectorAll("[data-regen]").forEach(b=>b.onclick=()=>genOne(b.dataset.regen,true));
}

  const sec=`<span class="sec">${shot.sec}</span>`;
  if(mode==="loading") t.innerHTML=`<span class="spin"></span>${badge}${sec}`;
  else if(mode==="img"){ t.innerHTML=`<img src="${payload}" alt="${id}">${badge}${sec}`;
    const a=document.getElementById("dl-"+id);a.href=payload;a.download=`武曲_${id}.png`;a.style.display="inline";}
  else if(mode==="err") t.innerHTML=`<div class="err">⚠ ${payload}</div>${badge}${sec}`;
  else t.innerHTML=`<span class="ph">🎬</span>${badge}${sec}`;
}

async function genOne(id,regen){
  const shot=SHOTS.find(x=>x.id===id);
  const prompt=document.getElementById("p-"+id).value.trim()||shot.p;
  setThumb(id,"loading");
  try{
    const r=await fetch((API_BASE||"")+"/imagine",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,style:"manhua",regen:!!regen})});
    const d=await r.json();
    if(!r.ok||!d.image) throw new Error(d.error||("HTTP "+r.status));
    state[id]={img:d.image}; await imgPut(id,d.image); setThumb(id,"img",d.image); return true;
  }catch(e){ setThumb(id,"err",(e&&e.message)||"失敗"); return false; }
}

// ── 批次生成（序列，避免打爆 API）────────────────────────
let running=false,stopFlag=false;
const genAllBtn=document.getElementById("genAll"),stopBtn=document.getElementById("stop");
const bar=document.getElementById("progBar"),status=document.getElementById("status");
genAllBtn.onclick=async()=>{
  if(running)return; running=true;stopFlag=false;genAllBtn.disabled=true;stopBtn.disabled=false;
  const todo=SHOTS.filter(s=>!state[s.id]); let done=0,ok=0;
  status.textContent=`開始：${todo.length} 格待生成`;
  for(const s of todo){
    if(stopFlag){status.textContent="已停止";break;}
    status.textContent=`生成中 ${s.id}（${done+1}/${todo.length}）…`;
    if(await genOne(s.id,false))ok++;
    done++; bar.style.width=Math.round(done/Math.max(1,todo.length)*100)+"%";
  }
  if(!stopFlag)status.textContent=`完成：成功 ${ok}/${todo.length}`;
  running=false;genAllBtn.disabled=false;stopBtn.disabled=true;
};
stopBtn.onclick=()=>{stopFlag=true;stopBtn.disabled=true;status.textContent="停止中…";};

// ── 清空 ────────────────────────────────────────────────
document.getElementById("clear").onclick=async()=>{
  if(!confirm("確定清空所有已生成的圖？（提示詞保留）"))return;
  await imgClear(); for(const k in state)delete state[k]; render(); status.textContent="已清空";
};

// ── 匯出分鏡聯絡表（自包含 HTML）─────────────────────────
document.getElementById("export").onclick=()=>{
  const cells=SHOTS.map(s=>{const img=state[s.id]?`<img src="${state[s.id].img}">`:`<div class="ph">未生成</div>`;
    return `<div class="c"><div class="h"><b>${s.id}</b> <span>${s.sec}</span></div>${img}
      <div class="t"><i>${s.shot}</i><br>${s.zh}</div></div>`;}).join("");
  const html=`<!doctype html><meta charset=utf-8><title>武曲破邪傳 分鏡聯絡表</title>
  <style>body{background:#0d0f14;color:#e8e6df;font-family:system-ui,"PingFang TC",sans-serif;margin:20px}
  h1{color:#e8b64b} .g{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .c{background:#161a22;border:1px solid #2b3341;border-radius:12px;overflow:hidden}
  .c img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block} .ph{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:#39414f}
  .h{display:flex;justify-content:space-between;padding:6px 10px;color:#39c07a;font-size:12px} .h span{color:#8b93a3}
  .t{padding:0 10px 10px;font-size:12.5px} .t i{color:#8b93a3}</style>
  <h1>🎬 《武曲破邪傳》分鏡聯絡表</h1><div class="g">${cells}</div>`;
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([html],{type:"text/html"}));
  a.download="武曲破邪傳_分鏡聯絡表.html";a.click();
};

// ── 啟動：還原已存圖 ─────────────────────────────────────
(async function(){
  render();
  for(const s of SHOTS){const v=await imgGet(s.id);if(v){state[s.id]={img:v};setThumb(s.id,"img",v);}}
  const n=Object.keys(state).length; status.textContent=n?`已還原 ${n} 格`:"就緒";
})();
</script>
</body>
